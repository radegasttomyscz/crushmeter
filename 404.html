<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stránka nenalezena | CrushMeter.cz</title>
  <meta name="description" content="Stránka nebyla nalezena. Vraťte se na CrushMeter.cz a spusťte kompatibilitní analýzu." />
  <meta name="robots" content="noindex,follow" />
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="/assets/site.css" />
  <style>
    :root{--bg:#05050a;--card:#0c0b14;--text:#fff;--muted:#c8c0d7;--pink:#ff4fb8;--violet:#8a2be2;}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:radial-gradient(circle at top left,rgba(255,79,184,.25),transparent 32%),radial-gradient(circle at bottom right,rgba(138,43,226,.28),transparent 38%),var(--bg);font-family:Arial,Helvetica,sans-serif;color:var(--text);}
    .notfound-wrap{min-height:calc(100vh - 160px);display:flex;align-items:center;justify-content:center;padding:72px 18px;}
    .notfound-card{width:min(780px,100%);padding:42px 28px;border-radius:32px;background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.035));border:1px solid rgba(255,255,255,.13);box-shadow:0 26px 80px rgba(0,0,0,.35);text-align:center;backdrop-filter:blur(16px);}
    .code{display:inline-flex;align-items:center;justify-content:center;width:88px;height:88px;border-radius:28px;background:linear-gradient(135deg,var(--pink),var(--violet));font-size:34px;font-weight:900;box-shadow:0 0 42px rgba(255,79,184,.28);}
    h1{margin:24px 0 12px;font-size:clamp(34px,6vw,64px);line-height:1.05;letter-spacing:-.04em;}
    .lead{max-width:590px;margin:0 auto 26px;color:var(--muted);font-size:17px;line-height:1.75;}
    .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:28px;}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 20px;border-radius:999px;text-decoration:none;font-weight:800;border:1px solid rgba(255,255,255,.14);}
    .btn-primary{background:linear-gradient(135deg,var(--pink),var(--violet));color:#fff;}
    .btn-secondary{background:rgba(255,255,255,.06);color:#fff;}
    .hint{margin-top:22px;color:#8e879c;font-size:13px;line-height:1.6;}
  </style>
</head>
<body>
  <div data-site-header></div>
  <main class="notfound-wrap">
    <section class="notfound-card" aria-labelledby="notfound-title">
      <div class="code">404</div>
      <h1 id="notfound-title">Tahle stránka mezi vámi není.</h1>
      <p class="lead">Odkaz je neplatný, stránka byla přesunuta nebo už neexistuje. Můžeš se vrátit na hlavní stránku a spustit novou kompatibilitní analýzu.</p>
      <div class="actions">
        <a class="btn btn-primary" href="/#formular">Spustit analýzu</a>
        <a class="btn btn-secondary" href="/">Zpět na hlavní stránku</a>
      </div>
      <p class="hint">Pokud jsi čekal/a výsledek analýzy e-mailem a něco nefunguje, napiš na <a href="mailto:info@tomys.cz" style="color:#ff4fb8;text-decoration:none;font-weight:700;">info@tomys.cz</a>.</p>
    </section>
  </main>
  <div data-site-footer></div>
  <script src="/assets/site.js"></script>
</body>
</html>
