<!-- ... (ponechej head a styly z minula, přidáme jen tyhle změny) ... -->

<style>
    /* Nové styly pro krokování */
    .step { display: none; }
    .step.active { display: block; animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .progress-bar {
        height: 4px;
        background: rgba(255,255,255,0.1);
        width: 100%;
        border-radius: 2px;
        margin-bottom: 2rem;
    }
    .progress-fill {
        height: 100%;
        background: linear-gradient(to right, #ff1493, #8a2be2);
        width: 33%;
        transition: width 0.4s ease;
    }
    .tag-input {
        cursor: pointer;
        transition: all 0.2s;
    }
    .tag-input:checked + label {
        background: #ff1493;
        color: white;
        border-color: #ff1493;
        box-shadow: 0 0 15px rgba(255,20,147,0.4);
    }
</style>

<!-- HLAVNÍ SEKCE FORMULÁŘE -->
<section id="formular" class="py-20 px-4 max-w-3xl mx-auto min-h-[80vh]">
    <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
    
    <form id="crushForm" class="glass p-8 md:p-12 rounded-[40px] relative overflow-hidden">
        
        <!-- STEP 1: TY -->
        <div class="step active" id="step1">
            <h3 class="text-3xl font-serif mb-8 text-neonPink">Kdo jsi ty?</h3>
            <div class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" id="userName" placeholder="Tvé jméno" class="glass-input p-4 rounded-2xl w-full" required>
                    <input type="date" id="userBirth" class="glass-input p-4 rounded-2xl w-full" required>
                </div>
                <div>
                    <p class="text-sm text-white/50 mb-3 text-center">Tvoje dominantní energie:</p>
                    <div class="flex flex-wrap justify-center gap-3">
                        <input type="radio" name="userVibe" id="v1" value="chaos" class="hidden tag-input"><label for="v1" class="px-4 py-2 border border-white/20 rounded-full text-sm">Energetický chaos</label>
                        <input type="radio" name="userVibe" id="v2" value="chill" class="hidden tag-input"><label for="v2" class="px-4 py-2 border border-white/20 rounded-full text-sm">Klid a chill</label>
                        <input type="radio" name="userVibe" id="v3" value="dark" class="hidden tag-input"><label for="v3" class="px-4 py-2 border border-white/20 rounded-full text-sm">Mystic / Dark</label>
                    </div>
                </div>
                <button type="button" onclick="nextStep(2)" class="w-full py-4 bg-white text-black font-bold rounded-2xl hover:bg-pink-500 hover:text-white transition">Pokračovat k crushi →</button>
            </div>
        </div>

        <!-- STEP 2: CRUSH -->
        <div class="step" id="step2">
            <h3 class="text-3xl font-serif mb-8 text-neonPurple">Kdo je tvůj Crush?</h3>
            <div class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" id="crushName" placeholder="Jeho/Její jméno" class="glass-input p-4 rounded-2xl w-full" required>
                    <input type="date" id="crushBirth" class="glass-input p-4 rounded-2xl w-full" required>
                </div>
                <div>
                    <p class="text-sm text-white/50 mb-3 text-center">Jak na tebe působí?</p>
                    <div class="flex flex-wrap justify-center gap-3">
                        <input type="radio" name="crushVibe" id="c1" value="redflag" class="hidden tag-input"><label for="c1" class="px-4 py-2 border border-white/20 rounded-full text-sm text-red-400">Red Flag 🚩</label>
                        <input type="radio" name="crushVibe" id="c2" value="golden" class="hidden tag-input"><label for="c2" class="px-4 py-2 border border-white/20 rounded-full text-sm">Golden Retriever</label>
                        <input type="radio" name="crushVibe" id="c3" value="mystic" class="hidden tag-input"><label for="c3" class="px-4 py-2 border border-white/20 rounded-full text-sm">Tajemný/á</label>
                    </div>
                </div>
                <div class="flex gap-4">
                    <button type="button" onclick="nextStep(1)" class="w-1/3 py-4 glass border border-white/10 rounded-2xl transition">Zpět</button>
                    <button type="button" onclick="nextStep(3)" class="w-2/3 py-4 bg-white text-black font-bold rounded-2xl hover:bg-purple-500 hover:text-white transition">Poslední detaily →</button>
                </div>
            </div>
        </div>

        <!-- STEP 3: VIBES & ANALÝZA -->
        <div class="step" id="step3">
            <h3 class="text-3xl font-serif mb-8 text-gradient text-center">Společná chemie</h3>
            <div class="space-y-6">
                <textarea id="story" placeholder="Napiš nám nějaký detail... (např. jak jste se poznali, co tě štve, nebo vtipnou storku)" class="glass-input p-4 rounded-2xl w-full h-32 resize-none"></textarea>
                
                <div class="grid grid-cols-2 gap-4">
                    <select id="frequency" class="glass-input p-4 rounded-2xl text-sm">
                        <option value="">Jak často si píšete?</option>
                        <option value="nonstop">24/7</option>
                        <option value="often">Každý den</option>
                        <option value="rarely">Jednou za čas</option>
                    </select>
                    <select id="status" class="glass-input p-4 rounded-2xl text-sm">
                        <option value="">Co mezi vámi je?</option>
                        <option value="crush">Jen crush</option>
                        <option value="ex">Ex, co mě straší</option>
                        <option value="situationship">Situationship</option>
                    </select>
                </div>

                <div class="flex gap-4">
                    <button type="button" onclick="nextStep(2)" class="w-1/3 py-4 glass border border-white/10 rounded-2xl transition">Zpět</button>
                    <button type="submit" class="w-2/3 py-4 bg-gradient-to-r from-neonPink to-neonPurple text-white font-bold rounded-2xl hover:scale-105 transition shadow-lg">Spustit AI analýzu ✨</button>
                </div>
            </div>
        </div>
    </form>
</section>

<script>
    function nextStep(step) {
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById('step' + step).classList.add('active');
        
        const progress = (step / 3) * 100;
        document.getElementById('progressFill').style.width = progress + '%';
        
        // Scroll do formuláře pro jistotu
        document.getElementById('formular').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // Tady pak napojíme volání na tvůj backend s Claude API
    document.getElementById('crushForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        // Zobrazení loaderu (to už máš v kódu)
        runLoader(); 
    });
</script>
