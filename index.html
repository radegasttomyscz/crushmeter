<!DOCTYPE html>
<html lang="cs" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrushMeter.cz | AI Analýza vztahové DNA</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: { darkBg: '#05050a', neonPink: '#ff1493', neonPurple: '#8a2be2' }
                }
            }
        }
    </script>

    <style type="text/css">
        html, body { background-color: #05050a; color: #ffffff; margin: 0; font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; outline: none; padding: 1rem; border-radius: 1rem; width: 100%; }
        .glass-input:focus { border-color: #ff1493; }
        .text-gradient { background: linear-gradient(to right, #ff1493, #8a2be2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .step { display: none; }
        .step.active { display: block; animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .tag-input:checked + label { background: white !important; color: black !important; border-color: white !important; }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 w-full z-[100] glass border-b border-white/5 py-4 px-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="#" class="flex items-center gap-2">
                <div class="w-8 h-8 bg-gradient-to-br from-neonPink to-neonPurple rounded-lg flex items-center justify-center">
                    <i class="fa-solid fa-bolt-lightning text-white text-sm"></i>
                </div>
                <span class="font-serif text-xl font-bold tracking-tighter">CrushMeter<span class="text-neonPink">.cz</span></span>
            </a>
        </div>
    </nav>

    <header class="min-h-screen flex flex-col items-center justify-center text-center px-4 pt-20">
        <h1 class="font-serif text-5xl md:text-7xl font-semibold mb-8 leading-tight">
            Odhalíme pravdu,<br><span class="text-gradient italic font-bold">kterou už cítíte.</span>
        </h1>
        <a href="#formular" class="px-12 py-5 bg-white text-black font-black rounded-full uppercase tracking-widest text-sm hover:scale-105 transition">
            Spustit Test Vztahu
        </a>
    </header>

    <section id="formular" class="py-32 px-4 bg-white/[0.01]">
        <div class="max-w-4xl mx-auto">
            <div class="text-center mb-12">
                <div class="inline-block px-4 py-1 glass rounded-full text-[10px] font-bold tracking-widest uppercase mb-4 text-white/40">
                    Krok <span id="stepNum">1</span> z 3
                </div>
                <div class="w-full bg-white/5 h-1 rounded-full overflow-hidden mb-8">
                    <div id="progress" class="bg-gradient-to-right from-neonPink to-neonPurple h-full transition-all duration-500" style="width: 33.33%"></div>
                </div>
            </div>

            <form id="crushForm" class="glass p-8 md:p-16 rounded-[4rem] border-white/10">
               <div id="step1" class="step active">
    <h3 class="text-3xl font-serif mb-8 italic text-center">Nejdřív něco <span class="text-neonPink">o sobě</span></h3>
    <input type="text" id="userName" required class="glass-input mb-4" placeholder="Tvé Jméno">
    <select id="userZodiac" required class="glass-input mb-6">
        <option value="" disabled selected>Tvé znamení</option>
        <option>Beran</option><option>Býk</option><option>Blíženci</option><option>Rak</option>
        <option>Lev</option><option>Panna</option><option>Váhy</option><option>Štír</option>
        <option>Střelec</option><option>Kozoroh</option><option>Vodnář</option><option>Ryby</option>
    </select>
    <button type="button" onclick="validateAndGo(1, 2)" class="w-full py-5 bg-white/10 rounded-2xl font-bold uppercase tracking-widest">Pokračovat</button>
</div>

<div id="step2" class="step">
    <h3 class="text-3xl font-serif mb-8 italic text-center">A teď tvůj <span class="text-neonPurple">Crush</span></h3>
    <input type="text" id="crushName" required class="glass-input mb-4" placeholder="Jméno tvého Crushe">
    <select id="crushZodiac" required class="glass-input mb-6">
        <option value="" disabled selected>Jeho/Její znamení</option>
        <option>Beran</option><option>Býk</option><option>Blíženci</option><option>Rak</option>
        <option>Lev</option><option>Panna</option><option>Váhy</option><option>Štír</option>
        <option>Střelec</option><option>Kozoroh</option><option>Vodnář</option><option>Ryby</option>
    </select>
    <div class="flex gap-4">
        <button type="button" onclick="goToStep(1)" class="w-1/3 py-5 glass rounded-2xl font-bold uppercase">Zpět</button>
        <button type="button" onclick="validateAndGo(2, 3)" class="w-2/3 py-5 bg-white/10 rounded-2xl font-bold uppercase tracking-widest">Poslední krok</button>
    </div>
</div>

<div id="step3" class="step">
    <h3 class="text-3xl font-serif mb-8 italic text-center">Váš <span class="text-gradient">vztah?</span></h3>
    <div class="grid grid-cols-2 gap-4 mb-8">
        <input type="radio" name="status" id="s1" value="pratelstvi" class="hidden tag-input" checked>
        <label for="s1" class="glass p-4 rounded-xl text-center cursor-pointer text-sm font-bold">Přátelství</label>
        <input type="radio" name="status" id="s2" value="vztah" class="hidden tag-input">
        <label for="s2" class="glass p-4 rounded-xl text-center cursor-pointer text-sm font-bold">Vztah</label>
    </div>
    <button type="submit" id="submitBtn" class="w-full py-6 bg-gradient-to-r from-neonPink to-neonPurple rounded-2xl font-black uppercase tracking-widest shadow-lg">
        Spustit AI analýzu (49 Kč)
    </button>
</div>
            </form>
        </div>
    </section>

    <script>
        function goToStep(stepNumber) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + stepNumber).classList.add('active');
            document.getElementById('stepNum').innerText = stepNumber;
            document.getElementById('progress').style.width = (stepNumber * 33.33) + '%';
        }

        function validateAndGo(curr, next) {
            const inputs = document.getElementById('step' + curr).querySelectorAll('input[required], select[required]');
            let valid = true;
            inputs.forEach(i => { if(!i.value) { valid = false; i.style.borderColor = 'red'; } else { i.style.borderColor = ''; } });
            if(valid) goToStep(next);
        }

        document.getElementById('crushForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Připravuji...';
            
            const data = {
                on1: document.getElementById('userName').value,
                zodiac1: document.getElementById('userZodiac').value,
                on2: document.getElementById('crushName').value,
                zodiac2: document.getElementById('crushZodiac').value,
                status: document.querySelector('input[name="status"]:checked').value
            };

            const metadata = JSON.stringify(data);
            const baseUrl = "https://form.simpleshop.cz/zQ0bQ/buy/";
            window.location.href = baseUrl + "?note=" + encodeURIComponent(metadata);
        });
    </script>
</body>
</html>
