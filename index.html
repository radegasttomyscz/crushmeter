<!DOCTYPE html>
<html lang="cs" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrushMeter.cz | AI Analýza chemie</title>
    
    <!-- Tailwind Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: { darkBg: '#05050a', neonPink: '#ff1493', neonPurple: '#8a2be2' }
                }
            }
        }
    </script>

    <style type="text/css">
        /* Hard-coded fallback, aby web nebyl nikdy bílý */
        html, body { 
            background-color: #05050a !important; 
            color: #ffffff !important; 
            margin: 0; 
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; outline: none; }
        .text-gradient { background: linear-gradient(to right, #ff1493, #8a2be2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .step { display: none; }
        .step.active { display: block; }
        .tag-input:checked + label { background: #ff1493 !important; border-color: #ff1493 !important; box-shadow: 0 0 15px rgba(255,20,147,0.4); }
    </style>
</head>
<body class="antialiased bg-darkBg text-white">

    <!-- Ambient Background -->
    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-neonPink/20 rounded-full filter blur-[100px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-neonPurple/20 rounded-full filter blur-[100px]"></div>
    </div>

    <!-- HERO -->
    <header class="min-h-screen flex flex-col items-center justify-center text-center px-4">
        <div class="glass px-4 py-1 rounded-full text-[10px] font-bold tracking-widest mb-6 border-white/10 uppercase">AI-Powered Relationship Lab</div>
        <h1 class="font-serif text-5xl md:text-8xl font-semibold mb-6">
            Jaká mezi vámi<br><span class="text-gradient italic">skutečně</span> je chemie?
        </h1>
        <p class="text-white/60 text-lg max-w-2xl mb-10 font-light">Claude 3.5 Sonnet analyzuje vaše vibes a skrytou energii.</p>
        <a href="#formular" class="px-10 py-5 bg-white text-black font-extrabold rounded-full hover:scale-105 transition shadow-[0_0_50px_rgba(255,20,147,0.3)] uppercase tracking-tight">
            Spustit analýzu
        </a>
    </header>

    <!-- FORMULÁŘ -->
    <section id="formular" class="py-20 px-4 max-w-3xl mx-auto">
        <div class="w-full bg-white/5 h-1 rounded-full mb-12 overflow-hidden">
            <div id="progress" class="h-full bg-gradient-to-r from-neonPink to-neonPurple transition-all duration-500" style="width: 33%"></div>
        </div>

        <form id="crushForm" class="glass p-8 md:p-12 rounded-[40px] relative">
            <!-- STEP 1 -->
            <div class="step active" id="step1">
                <h3 class="text-3xl font-serif mb-8 text-neonPink uppercase tracking-tighter italic">01. O tobě</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <input type="text" id="userName" placeholder="Tvé jméno" class="glass-input p-4 rounded-2xl w-full" required>
                    <input type="date" id="userBirth" class="glass-input p-4 rounded-2xl w-full" required>
                </div>
                <div class="mb-8">
                    <p class="text-xs text-white/40 mb-4 uppercase tracking-widest text-center">Tvoje dominantní energie</p>
                    <div class="flex flex-wrap justify-center gap-3">
                        <input type="radio" name="userVibe" id="v1" value="chaos" class="hidden tag-input" checked>
                        <label for="v1" class="px-5 py-2 border border-white/20 rounded-full text-sm cursor-pointer transition hover:border-neonPink">Chaos & Fun</label>
                        
                        <input type="radio" name="userVibe" id="v2" value="chill" class="hidden tag-input">
                        <label for="v2" class="px-5 py-2 border border-white/20 rounded-full text-sm cursor-pointer transition hover:border-neonPink">Deep & Chill</label>
                    </div>
                </div>
                <button type="button" onclick="goToStep(2)" class="w-full py-5 bg-white text-black font-bold rounded-2xl hover:bg-neonPink hover:text-white transition uppercase">Další krok</button>
            </div>

            <!-- STEP 2 -->
            <div class="step" id="step2">
                <h3 class="text-3xl font-serif mb-8 text-neonPurple uppercase tracking-tighter italic">02. Tvůj Crush</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <input type="text" id="crushName" placeholder="Jméno crushe" class="glass-input p-4 rounded-2xl w-full" required>
                    <input type="date" id="crushBirth" class="glass-input p-4 rounded-2xl w-full" required>
                </div>
                <div class="flex gap-4">
                    <button type="button" onclick="goToStep(1)" class="w-1/3 py-5 glass rounded-2xl opacity-50">Zpět</button>
                    <button type="button" onclick="goToStep(3)" class="w-2/3 py-5 bg-white text-black font-bold rounded-2xl">Poslední krok</button>
                </div>
            </div>

            <!-- STEP 3 -->
            <div class="step" id="step3">
                <h3 class="text-3xl font-serif mb-8 text-gradient uppercase tracking-tighter italic">03. Detaily</h3>
                <textarea id="story" placeholder="Jaká je vaše storka? Co se mezi vámi děje?" class="glass-input p-5 rounded-2xl w-full h-40 resize-none mb-6" required></textarea>
                <div class="flex gap-4">
                    <button type="button" onclick="goToStep(2)" class="w-1/3 py-5 glass rounded-2xl opacity-50">Zpět</button>
                    <button type="submit" class="w-2/3 py-5 bg-gradient-to-r from-neonPink to-neonPurple text-white font-bold rounded-2xl shadow-lg uppercase">Analyzovat</button>
                </div>
            </div>
        </form>
    </section>

    <script>
        function goToStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            document.getElementById('progress').style.width = (step / 3 * 100) + '%';
        }
    </script>
</body>
</html>
